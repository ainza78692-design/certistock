name: Deploy CertiStock Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: certistock-production
  cancel-in-progress: false

jobs:
  verify-and-deploy:
    runs-on: [self-hosted, linux]
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Network Debug
        run: |
          echo "===== USER ====="
          whoami

          echo "===== HOSTNAME ====="
          hostname

          echo "===== TAILSCALE STATUS ====="
          tailscale status || true

          echo "===== TAILSCALE IP ====="
          tailscale ip -4 || true

          echo "===== TAILSCALE SELF CHECK ====="
          tailscale ping yesfashion || true

          echo "===== TAILSCALE TO LAPTOP ====="
          tailscale ping anas || true

          echo "===== NETWORK INTERFACES ====="
          ip addr || true

          echo "===== ROUTES ====="
          ip route || true

          echo "===== PORTS ====="
          ss -tulpn || true

          echo "===== TAILSCALE PROCESS ====="
          ps aux | grep tailscale || true

          echo "===== SSH PROCESS ====="
          ps aux | grep sshd || true

          echo "===== LOCAL HEALTH CHECK ====="
          curl -s http://127.0.0.1:8787/health || true

      - name: Deploy
        run: sudo /usr/local/bin/deploy-certistock.sh
