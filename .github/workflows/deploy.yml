name: Deploy CertiStock Production
 
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: certistock-production
  cancel-in-progress: false

jobs:
  verify-and-deploy:
    runs-on: [self-hosted, linux]
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy
        run: sudo /usr/local/bin/deploy-certistock.sh
