name: Deploy CertiStock Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: certistock-production
  cancel-in-progress: false

jobs:
  verify-and-deploy:
    runs-on: [self-hosted, linux]
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Network and Firewall Debug
        run: |
          echo "=================================================="
          echo "USER"
          echo "=================================================="
          whoami

          echo "=================================================="
          echo "HOSTNAME"
          echo "=================================================="
          hostname

          echo "=================================================="
          echo "TAILSCALE STATUS"
          echo "=================================================="
          tailscale status || true

          echo "=================================================="
          echo "TAILSCALE IP"
          echo "=================================================="
          tailscale ip -4 || true

          echo "=================================================="
          echo "TAILSCALE TO LAPTOP"
          echo "=================================================="
          tailscale ping anas || true

          echo "=================================================="
          echo "NETWORK INTERFACES"
          echo "=================================================="
          ip addr || true

          echo "=================================================="
          echo "ROUTES"
          echo "=================================================="
          ip route || true

          echo "=================================================="
          echo "PORTS"
          echo "=================================================="
          ss -tulpn || true

          echo "=================================================="
          echo "TAILSCALE PROCESS"
          echo "=================================================="
          ps aux | grep tailscale || true

          echo "=================================================="
          echo "SSH PROCESS"
          echo "=================================================="
          ps aux | grep sshd || true

          echo "=================================================="
          echo "LOCAL HEALTH CHECK"
          echo "=================================================="
          curl -s http://127.0.0.1:8787/health || true

          echo "=================================================="
          echo "UFW STATUS"
          echo "=================================================="
          sudo -n ufw status verbose || true

          echo "=================================================="
          echo "IPTABLES"
          echo "=================================================="
          sudo -n iptables -L -n -v || true

          echo "=================================================="
          echo "NFTABLES"
          echo "=================================================="
          sudo -n nft list ruleset || true

      - name: Deploy
        run: sudo /usr/local/bin/deploy-certistock.sh
