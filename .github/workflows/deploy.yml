name: Deploy CertiStock Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: certistock-production
  cancel-in-progress: false

jobs:
  verify-and-deploy:
    runs-on: [self-hosted, linux]
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Network Debug
        run: |
          echo "===== USER ====="
          whoami

          echo "===== HOSTNAME ====="
          hostname

          echo "===== TAILSCALE STATUS ====="
          tailscale status || true

          echo "===== TAILSCALE IP ====="
          tailscale ip -4 || true

          echo "===== NETWORK INTERFACES ====="
          ip addr || true

          echo "===== ROUTES ====="
          ip route || true

          echo "===== PORTS ====="
          ss -tulpn || true

          echo "===== PROCESS CHECK ====="
          ps aux | grep -E 'ssh|tailscale|tailscaled' || true

      - name: Deploy
        run: sudo /usr/local/bin/deploy-certistock.sh
