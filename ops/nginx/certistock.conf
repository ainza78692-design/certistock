server {
    listen 80;
    server_name certistock.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name certistock.local;

    ssl_certificate /etc/ssl/certistock/certistock.local.crt;
    ssl_certificate_key /etc/ssl/certistock/certistock.local.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 60m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    access_log /var/log/nginx/certistock.access.log;
    error_log /var/log/nginx/certistock.error.log warn;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }

    location = /updates/version.json {
        alias /srv/certistock/updates/version.json;
        add_header Cache-Control "no-store" always;
        try_files $uri =404;
    }

    location ^~ /updates/release-notes/ {
        alias /srv/certistock/updates/release-notes/;
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri =404;
    }

    location ^~ /updates/installers/ {
        alias /srv/certistock/updates/installers/;
        add_header Cache-Control "public, max-age=86400, immutable" always;
        try_files $uri =404;
    }
}
